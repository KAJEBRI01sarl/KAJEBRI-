/* ---------------- localStorage-backed collection hook ---------------- */
function useCollection(key, seed) {
  const [items, setItems] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    if (seed && seed.length) {
      try {
        if (!localStorage.getItem(key + "-seeded")) {
          localStorage.setItem(key, JSON.stringify(seed));
          localStorage.setItem(key + "-seeded", "true");
          return seed;
        }
      } catch (e) {}
    }
    return [];
  });

  function persist(next) {
    setItems(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch (e) {}
  }
  const add = (item) => persist([{ ...item, id: uid(), createdAt: new Date().toISOString() }, ...items]);
  const update = (id, patch) => persist(items.map((it) => (it.id === id ? { ...it, ...patch } : it)));
  const remove = (id) => persist(items.filter((it) => it.id !== id));

  return { items, loading: false, error: null, add, update, remove };
}

  async function handleCopy() {
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); }

      const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select();

  return (
    <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap" }}>

function daysUntil(d) { if (!d) return null; return Math.ceil((new Date(d) - new Date(new Date().toDateString())) / 86400000); }

/* ============ Module S — Sauvegarde ============ */
const ALL_KEYS = [["kajebri-partners","Partenaires"],["kajebri-tenders","AO"],["kajebri-architects","Architectes"],["kajebri-sites","Chantiers"],["kajebri-visits","Visites"]];
function BackupModule() {
  const [exportText, setExportText] = useState("");
  const [importText, setImportText] = useState("");
  const [status, setStatus] = useState("");
  const [copied, setCopied] = useState(false);

  function handleExport() {
    const dump = {};
    for (const [key] of ALL_KEYS) { try { dump[key] = JSON.parse(localStorage.getItem(key) || "[]"); } catch (e) { dump[key] = []; } }
    setExportText(JSON.stringify(dump, null, 2));
  }
  async function handleCopy() {
    try { await navigator.clipboard.writeText(exportText); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch (e) {}
  }
  function handleImport() {
    try {
      const data = JSON.parse(importText);
      const results = [];
      for (const [key, label] of ALL_KEYS) {
        if (!(key in data)) continue;
        localStorage.setItem(key, JSON.stringify(data[key]));
        results.push(`${label}: restauré ✓`);
      }
      setStatus(results.join("\n") + "\n\nRechargez la page pour voir les données.");
    } catch (e) { setStatus("Texte invalide."); }
  }
  return (
    <div>
      <div style={{ background: `${C.brass}12`, border: `1px solid ${C.brass}55`, borderRadius: 10, padding: 14, marginBottom: 20 }}>
        <p style={{ margin: 0, fontSize: 13, color: C.cream, lineHeight: 1.5 }}>
          Cette version stocke vos données directement sur cet appareil (mémoire du navigateur) — pas besoin de compte payant. Elles restent tant que vous ne videz pas les données du site. Exportez régulièrement pour changer d'appareil ou garder une copie de sécurité.
        </p>
      </div>
      <h3 style={{ fontSize: 14, color: C.cream }}>1. Exporter</h3>
      <PrimaryButton onClick={handleExport} style={{ marginBottom: 10 }}>Générer l'export</PrimaryButton>
      {exportText && (
        <>
          <textarea readOnly value={exportText} style={{ width: "100%", height: "20vh", fontFamily: "ui-monospace, monospace", fontSize: 11, color: C.cream, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: 12, marginBottom: 8 }} />
          <PrimaryButton onClick={handleCopy}>{copied ? "Copié" : "Copier l'export"}</PrimaryButton>
        </>
      )}
      <h3 style={{ fontSize: 14, color: C.cream, marginTop: 24 }}>2. Restaurer</h3>
      <TextArea value={importText} onChange={(e) => setImportText(e.target.value)} placeholder="Collez un export ici…" style={{ height: "16vh", marginBottom: 10 }} />
      <PrimaryButton onClick={handleImport}>Restaurer</PrimaryButton>
      {status && <pre style={{ whiteSpace: "pre-wrap", fontSize: 12, color: C.brassLight, marginTop: 14, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 12 }}>{status}</pre>}
    </div>
  );
}

          <span style={{ fontWeight: 800, fontSize: 17 }}>KAJEBRI</span>
          <span style={{ fontSize: 12, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Général 01</span>
        </div>
        <FloorDisplay label={FLOORS.find((f) => f.id === module)?.label || ""} />
      </header>
      <FloorNav current={module} onChange={setModule} />
      <main style={{ padding: "22px 20px", maxWidth: 1100, margin: "0 auto" }}>
        <div style={{ display: module === "backup" ? "block" : "none" }}><BackupModule /></div>
        <div style={{ display: module === "dashboard" ? "block" : "none" }}><Dashboard go={setModule} /></div>
        <div style={{ display: module === "partners" ? "block" : "none" }}><PartnersModule /></div>
        <div style={{ display: module === "architects" ? "block" : "none" }}><ArchitectsModule /></div>
        <div style={{ display: module === "sites" ? "block" : "none" }}><SitesModule /></div>
        <div style={{ display: module === "visits" ? "block" : "none" }}><VisitsModule /></div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
